<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공부팟 출석 사이트</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --admin-color: #e67e22;
            --bg-color: #f4f7f6;
            --danger-color: #e74c3c;
        }

        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .screen { display: none; width: 100%; max-width: 500px; padding: 20px; flex-direction: column; align-items: center; }
        .active { display: flex; }

        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; box-sizing: border-box; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { cursor: pointer; border: none; border-radius: 8px; padding: 12px 20px; background: var(--primary-color); color: white; font-weight: bold; width: 100%; font-size: 1rem; }
        .secondary-btn { background: #666; margin-top: 10px; }

        .header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; width: 100%; }
        .day { aspect-ratio: 1 / 1; border: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: center; position: relative; border-radius: 8px; font-size: 0.9rem; background: #fff; cursor: pointer; }
        .day.today { border: 2.5px solid var(--primary-color); font-weight: bold; background: #f0f7ff; }
        .day.other-month { visibility: hidden; }
        .attendance-mark, .absent-mark { width: 85%; height: 85%; object-fit: contain; position: absolute; pointer-events: none; }
        .day-label { font-weight: bold; color: #999; font-size: 0.8rem; margin-bottom: 5px; text-align: center; }

        #admin-screen { max-width: 600px; }
        .member-selector { margin-bottom: 20px; width: 100%; height: 40px; border-radius: 8px; padding: 0 10px; }
        .stats-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; width: 100%; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 10px; font-size: 0.85rem; border: 1px solid #eee; }
        .stat-card b { font-size: 1.1rem; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="card">
            <h1>공부팟 출석 사이트</h1>
            <input type="text" id="user-name" placeholder="이름을 입력해주세요">
            <button onclick="enterSite()">출석하기</button>
            <button class="secondary-btn" onclick="askAdminPassword()">관리자 모드</button>
        </div>
    </div>

    <div id="user-screen" class="screen">
        <div class="header">
            <button style="width:auto" onclick="changeMonth(-1)">이전</button>
            <h2 id="month-title"></h2>
            <button style="width:auto" onclick="changeMonth(1)">다음</button>
        </div>
        <div class="card">
            <p><strong id="display-name"></strong> 님 환영합니다!</p>
            <div class="calendar-grid" id="user-calendar"></div>
            <button class="secondary-btn" onclick="location.reload()">로그아웃</button>
        </div>
    </div>

    <div id="admin-screen" class="screen">
        <div class="header">
            <button style="width:auto" onclick="changeAdminMonth(-1)">이전</button>
            <h2 id="admin-month-title"></h2>
            <button style="width:auto" onclick="changeAdminMonth(1)">다음</button>
        </div>
        <div class="card">
            <h3>관리자 모드</h3>
            <select id="member-select" class="member-selector" onchange="loadMemberAttendance()"></select>
            <div class="calendar-grid" id="admin-calendar"></div>
            <div class="stats-box" id="admin-stats"></div>
            <button class="secondary-btn" onclick="location.reload()" style="background: var(--admin-color);">관리자 종료</button>
        </div>
    </div>

<script>
    const ADMIN_PW = "1324";
    let currentUser = "";
    let currentYear = 2026;
    let currentMonth = 4; // 5월
    let allData = JSON.parse(localStorage.getItem('study_attendance')) || {};

    function enterSite() {
        const nameInput = document.getElementById('user-name').value.trim();
        if (!nameInput) { alert("이름을 입력해주세요!"); return; }
        currentUser = nameInput;
        if (!allData[currentUser]) allData[currentUser] = [];
        document.getElementById('display-name').innerText = currentUser;
        switchScreen('user-screen');
        renderCalendar('user-calendar', false);
    }

    function askAdminPassword() {
        const pw = prompt("관리자 비밀번호를 입력하세요.");
        if (pw === ADMIN_PW) {
            switchScreen('admin-screen');
            updateMemberSelect();
            renderCalendar('admin-calendar', true);
        } else { alert("비밀번호가 틀렸습니다."); }
    }

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function renderCalendar(containerId, isAdminMode) {
        const container = document.getElementById(containerId);
        const titleId = isAdminMode ? 'admin-month-title' : 'month-title';
        document.getElementById(titleId).innerText = `${currentYear}년 ${currentMonth + 1}월`;
        
        container.innerHTML = '';
        ['일','월','화','수','목','금','토'].forEach(l => container.innerHTML += `<div class="day-label">${l}</div>`);

        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
        
        // 오늘 날짜 정보 (시간 00:00:00으로 고정)
        const now = new Date();
        const realToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());

        for (let i = 0; i < firstDay; i++) container.innerHTML += `<div class="day other-month"></div>`;

        const targetUser = isAdminMode ? document.getElementById('member-select').value : currentUser;

        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${currentYear}-${currentMonth + 1}-${d}`;
            const thisDate = new Date(currentYear, currentMonth, d);
            const isToday = (thisDate.getTime() === realToday.getTime());
            const isPast = (thisDate.getTime() < realToday.getTime());
            
            const dayDiv = document.createElement('div');
            dayDiv.className = `day ${isToday ? 'today' : ''}`;
            dayDiv.innerText = d;

            const hasAttended = allData[targetUser] && allData[targetUser].includes(dateStr);

            if (hasAttended) {
                // 출석 도장 표시
                const img = document.createElement('img');
                img.src = 'HiHello.png';
                img.className = 'attendance-mark';
                dayDiv.appendChild(img);
            } else if (isPast) {
                // 오늘 이전이고 출석 안했다면 결석 이미지 표시
                const img = document.createElement('img');
                img.src = '결석이미지.png'; // 공백 처리
                img.className = 'absent-mark';
                dayDiv.appendChild(img);
            }

            dayDiv.onclick = () => {
                if (isAdminMode) toggleAttendanceAdmin(targetUser, dateStr);
                else markAttendanceUser(dateStr);
            };
            container.appendChild(dayDiv);
        }
        if (isAdminMode) updateAdminStats(targetUser);
    }

    function markAttendanceUser(dateStr) {
        const now = new Date();
        const todayStr = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
        if (dateStr !== todayStr) { alert("오늘 날짜만 출석이 가능합니다!"); return; }
        if (!allData[currentUser].includes(dateStr)) {
            allData[currentUser].push(dateStr);
            saveData();
            renderCalendar('user-calendar', false);
        } else { alert("이미 출석하셨습니다!"); }
    }

    function updateMemberSelect() {
        const select = document.getElementById('member-select');
        select.innerHTML = '';
        Object.keys(allData).forEach(name => {
            select.innerHTML += `<option value="${name}">${name}</option>`;
        });
    }

    function loadMemberAttendance() { renderCalendar('admin-calendar', true); }

    function toggleAttendanceAdmin(user, dateStr) {
        if (!user) return;
        const index = allData[user].indexOf(dateStr);
        if (index > -1) {
            if (confirm(`${user} 님의 출석을 취소하시겠습니까?`)) allData[user].splice(index, 1);
        } else {
            if (confirm(`${user} 님을 강제 출석 처리하시겠습니까?`)) allData[user].push(dateStr);
        }
        saveData();
        renderCalendar('admin-calendar', true);
    }

    function updateAdminStats(user) {
        if (!user || !allData[user]) return;
        const now = new Date();
        const realToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        
        let passedDays = 0; // 오늘까지 흐른 총 일수 (5월 1일부터)
        let attendCount = 0;

        // 5월 1일부터 오늘까지 반복하며 체크
        for (let m = 4; m <= currentMonth; m++) {
            const lastDate = new Date(2026, m + 1, 0).getDate();
            for (let d = 1; d <= lastDate; d++) {
                const checkDate = new Date(2026, m, d);
                // 5월 1일 이전이거나 오늘 이후는 제외
                if (m === 4 && d < 1) continue;
                if (checkDate > realToday) break;

                passedDays++;
                const dateKey = `${2026}-${m + 1}-${d}`;
                if (allData[user].includes(dateKey)) attendCount++;
            }
        }

        const rate = passedDays > 0 ? ((attendCount / passedDays) * 100).toFixed(1) : 0;

        document.getElementById('admin-stats').innerHTML = `
            <div class="stat-card">전체 진행 일수<b>${passedDays}일</b></div>
            <div class="stat-card">출석 횟수<b>${attendCount}회</b></div>
            <div class="stat-card">출석률<b>${rate}%</b></div>
            <div class="stat-card">결석 횟수<b>${passedDays - attendCount}회</b></div>
        `;
    }

    function changeMonth(diff) {
        currentMonth += diff;
        if (currentMonth < 4) currentMonth = 4;
        if (currentMonth > 11) currentMonth = 11;
        renderCalendar('user-calendar', false);
    }

    function changeAdminMonth(diff) {
        currentMonth += diff;
        if (currentMonth < 0) { currentYear--; currentMonth = 11; }
        else if (currentMonth > 11) { currentYear++; currentMonth = 0; }
        renderCalendar('admin-calendar', true);
    }

    function saveData() { localStorage.setItem('study_attendance', JSON.stringify(allData)); }
</script>
</body>
</html>
