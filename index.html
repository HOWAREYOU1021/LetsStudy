<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공부팟 실시간 출석 사이트</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary-color: #4a90e2; --admin-color: #e67e22; --bg-color: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .screen { display: none; width: 100%; max-width: 500px; padding: 20px; flex-direction: column; align-items: center; }
        .active { display: flex; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; box-sizing: border-box; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { cursor: pointer; border: none; border-radius: 8px; padding: 12px 20px; background: var(--primary-color); color: white; font-weight: bold; width: 100%; font-size: 1rem; }
        .header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; width: 100%; }
        .day { aspect-ratio: 1 / 1; border: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: center; position: relative; border-radius: 8px; font-size: 0.9rem; background: #fff; cursor: pointer; }
        .day.today { border: 2.5px solid var(--primary-color); font-weight: bold; background: #f0f7ff; }
        .day.other-month { visibility: hidden; }
        .attendance-mark, .absent-mark { width: 85%; height: 85%; object-fit: contain; position: absolute; pointer-events: none; }
        .day-label { font-weight: bold; color: #999; font-size: 0.8rem; text-align: center; margin-bottom: 5px; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 10px; font-size: 0.85rem; margin-top: 10px; border: 1px solid #eee; }
        .stat-card b { display: block; font-size: 1.1rem; margin-top: 5px; }
        .member-selector { width: 100%; height: 40px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; padding: 0 10px; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="card">
            <h1>공부팟 실시간 출석</h1>
            <input type="text" id="user-name" placeholder="이름을 입력해주세요">
            <button onclick="enterSite()">출석하기</button>
            <button style="background:#666; margin-top:10px;" onclick="askAdminPassword()">관리자 모드</button>
        </div>
    </div>

    <div id="user-screen" class="screen">
        <div class="header">
            <button style="width:auto" onclick="changeMonth(-1)">이전</button>
            <h2 id="month-title"></h2>
            <button style="width:auto" onclick="changeMonth(1)">다음</button>
        </div>
        <div class="card">
            <p><strong id="display-name"></strong>님 공부 화이팅! ✍️</p>
            <div class="calendar-grid" id="user-calendar"></div>
            <button style="background:#666; margin-top:20px;" onclick="location.reload()">로그아웃</button>
        </div>
    </div>

    <div id="admin-screen" class="screen">
        <div class="header">
            <button style="width:auto" onclick="changeAdminMonth(-1)">이전</button>
            <h2 id="admin-month-title"></h2>
            <button style="width:auto" onclick="changeAdminMonth(1)">다음</button>
        </div>
        <div class="card">
            <h3>관리자 대시보드</h3>
            <select id="member-select" class="member-selector" onchange="loadMemberData()"></select>
            <div class="calendar-grid" id="admin-calendar"></div>
            <div id="admin-stats" class="stats-box"></div>
            <button style="background:var(--admin-color); margin-top:20px;" onclick="location.reload()">관리자 종료</button>
        </div>
    </div>

<script>
    // -------------------------------------------------------------------------
    // 1. FIREBASE 초기화 (보내주신 설정값 적용)
    // -------------------------------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyD6wZ3D0ZBsJhfHxkMbAI_b8mFD3LIo-sU",
        authDomain: "stuudy-1b38b.firebaseapp.com",
        projectId: "stuudy-1b38b",
        storageBucket: "stuudy-1b38b.firebasestorage.app",
        messagingSenderId: "761780648746",
        appId: "1:761780648746:web:5eb50f468afee112c7fc53",
        measurementId: "G-X58YBTR28J"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const ADMIN_PW = "1324";
    const LIMIT_DATE = new Date(2026, 4, 8); // 5월 8일 제한
    let currentUser = "";
    let currentYear = 2026;
    let currentMonth = 4; // 5월
    let allStudyData = {};

    // 실시간 DB 데이터 감시
    db.collection("attendance").onSnapshot((snapshot) => {
        allStudyData = {};
        snapshot.forEach((doc) => {
            allStudyData[doc.id] = doc.data();
        });
        
        // 데이터 변경 시 현재 화면 갱신
        if (document.getElementById('user-screen').classList.contains('active')) {
            renderCalendar('user-calendar', false);
        }
        if (document.getElementById('admin-screen').classList.contains('active')) {
            updateMemberSelect();
            renderCalendar('admin-calendar', true);
        }
    });

    async function enterSite() {
        const nameInput = document.getElementById('user-name').value.trim();
        if (!nameInput) { alert("이름을 입력하세요!"); return; }
        currentUser = nameInput;
        
        // DB에 유저 데이터가 없으면 새로 생성
        if (!allStudyData[currentUser]) {
            await db.collection("attendance").doc(currentUser).set({ attendance: [], absence: [] });
        }
        
        document.getElementById('display-name').innerText = currentUser;
        switchScreen('user-screen');
        renderCalendar('user-calendar', false);
    }

    function renderCalendar(containerId, isAdminMode) {
        const container = document.getElementById(containerId);
        const titleId = isAdminMode ? 'admin-month-title' : 'month-title';
        document.getElementById(titleId).innerText = `${currentYear}년 ${currentMonth + 1}월`;
        
        container.innerHTML = '';
        ['일','월','화','수','목','금','토'].forEach(l => container.innerHTML += `<div class="day-label">${l}</div>`);

        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
        const realToday = new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());

        for (let i = 0; i < firstDay; i++) container.innerHTML += `<div class="day other-month"></div>`;

        const targetUser = isAdminMode ? document.getElementById('member-select').value : currentUser;
        const userData = allStudyData[targetUser] || { attendance: [], absence: [] };

        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${currentYear}-${currentMonth + 1}-${d}`;
            const thisDate = new Date(currentYear, currentMonth, d);
            const isToday = (thisDate.getTime() === realToday.getTime());
            const isPast = (thisDate.getTime() < realToday.getTime());
            const isLocked = (thisDate < LIMIT_DATE);
            
            const dayDiv = document.createElement('div');
            dayDiv.className = `day ${isToday ? 'today' : ''}`;
            dayDiv.innerText = d;

            if (!isLocked) {
                if (userData.attendance && userData.attendance.includes(dateStr)) {
                    dayDiv.innerHTML += `<img src="HiHello.png" class="attendance-mark">`;
                } else if (userData.absence && userData.absence.includes(dateStr)) {
                    dayDiv.innerHTML += `<img src="absent.png" class="absent-mark">`;
                } else if (isPast && !isAdminMode) {
                    // 유저 화면에서 오늘 이전 미기록 데이터는 결석 이미지 자동 표시
                    dayDiv.innerHTML += `<img src="absent.png" class="absent-mark">`;
                }
            }

            dayDiv.onclick = () => {
                if (isLocked && !isAdminMode) return;
                if (isAdminMode) toggleAdmin(targetUser, dateStr);
                else markUser(dateStr);
            };
            container.appendChild(dayDiv);
        }
        if (isAdminMode) updateStats(targetUser);
    }

    async function markUser(dateStr) {
        const now = new Date();
        const todayStr = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
        if (dateStr !== todayStr) { alert("오늘 날짜만 출석이 가능합니다!"); return; }
        
        const userRef = db.collection("attendance").doc(currentUser);
        await userRef.update({
            attendance: firebase.firestore.FieldValue.arrayUnion(dateStr),
            absence: firebase.firestore.FieldValue.arrayRemove(dateStr)
        });
    }

    async function toggleAdmin(user, dateStr) {
        if (!user) return;
        const opt = prompt(`[${user}] 상태 변경:\n1: 출석, 2: 결석, 3: 삭제`, "1");
        const userRef = db.collection("attendance").doc(user);
        
        if (opt === "1") {
            await userRef.update({ attendance: firebase.firestore.FieldValue.arrayUnion(dateStr), absence: firebase.firestore.FieldValue.arrayRemove(dateStr) });
        } else if (opt === "2") {
            await userRef.update({ absence: firebase.firestore.FieldValue.arrayUnion(dateStr), attendance: firebase.firestore.FieldValue.arrayRemove(dateStr) });
        } else if (opt === "3") {
            await userRef.update({ attendance: firebase.firestore.FieldValue.arrayRemove(dateStr), absence: firebase.firestore.FieldValue.arrayRemove(dateStr) });
        }
    }

    function updateMemberSelect() {
        const select = document.getElementById('member-select');
        const currentVal = select.value;
        const members = Object.keys(allStudyData);
        select.innerHTML = members.map(m => `<option value="${m}">${m}</option>`).join('');
        if (currentVal && members.includes(currentVal)) select.value = currentVal;
    }

    function askAdminPassword() {
        const pw = prompt("관리자 비밀번호를 입력하세요.");
        if (pw === ADMIN_PW) {
            switchScreen('admin-screen');
            updateMemberSelect();
            renderCalendar('admin-calendar', true);
        } else { alert("비밀번호가 틀렸습니다."); }
    }

    function updateStats(user) {
        if (!user || !allStudyData[user]) return;
        const now = new Date();
        const realToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        
        let passedDays = 0;
        let attendCount = 0;
        let absentCount = 0;

        for (let m = 4; m <= currentMonth; m++) {
            const lastDate = new Date(2026, m + 1, 0).getDate();
            for (let d = 1; d <= lastDate; d++) {
                const checkDate = new Date(2026, m, d);
                if (checkDate < LIMIT_DATE) continue;
                if (checkDate > realToday) break;

                passedDays++;
                const dateKey = `${2026}-${m + 1}-${d}`;
                if (allStudyData[user].attendance.includes(dateKey)) attendCount++;
                else absentCount++;
            }
        }

        const rate = passedDays > 0 ? ((attendCount / passedDays) * 100).toFixed(1) : 0;
        document.getElementById('admin-stats').innerHTML = `
            <div class="stat-card">진행 일수(8일부터)<b>${passedDays}일</b></div>
            <div class="stat-card">출석 횟수<b>${attendCount}회</b></div>
            <div class="stat-card">출석률<b>${rate}%</b></div>
            <div class="stat-card">결석 횟수<b>${absentCount}회</b></div>
        `;
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function changeMonth(diff) { currentMonth += diff; if(currentMonth<4) currentMonth=4; if(currentMonth>11) currentMonth=11; renderCalendar('user-calendar', false); }
    function changeAdminMonth(diff) { currentMonth += diff; if(currentMonth<0) {currentYear--; currentMonth=11;} else if(currentMonth>11) {currentYear++; currentMonth=0;} renderCalendar('admin-calendar', true); }
    function loadMemberData() { renderCalendar('admin-calendar', true); }

</script>
</body>
</html>
